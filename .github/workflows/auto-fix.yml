name: Auto-fix style and open PR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # weekly on Monday

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install formatters
        run: pip install black isort ruff

      - name: Run formatters (modify files)
        run: |
          black .
          isort .
          ruff check --fix . || true

      - name: Create a PR with fixes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: run auto-formatters (black/isort/ruff)"
          branch: ci/autofix
          title: "ci: auto-format code (black/isort/ruff)"
          body: |
            This PR applies automatic formatting fixes from CI.